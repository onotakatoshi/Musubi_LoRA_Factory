<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07121f"/>
      <stop offset="0.55" stop-color="#0b2033"/>
      <stop offset="1" stop-color="#02070d"/>
    </linearGradient>
    <linearGradient id="red" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ff5a36"/>
      <stop offset="1" stop-color="#b81612"/>
    </linearGradient>
    <linearGradient id="white" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#d6dde6"/>
    </linearGradient>
    <linearGradient id="metal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f3f6f8"/>
      <stop offset="0.45" stop-color="#8794a0"/>
      <stop offset="1" stop-color="#e7ecef"/>
    </linearGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#000" flood-opacity="0.55"/>
    </filter>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect x="34" y="34" width="444" height="444" rx="88" fill="url(#bg)"/>
  <rect x="40" y="40" width="432" height="432" rx="82" fill="none" stroke="#1b4c68" stroke-width="2" opacity="0.7"/>

  <!-- circuit traces -->
  <g fill="none" stroke="#27d8ff" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" opacity="0.78" filter="url(#glow)">
    <path d="M68 356h70v-36h60"/>
    <path d="M74 126h54v42h54"/>
    <path d="M356 78v72h60"/>
    <path d="M392 378h-72v46"/>
    <path d="M74 398h114"/>
    <path d="M404 118h36"/>
  </g>
  <g fill="#27d8ff" opacity="0.9">
    <circle cx="68" cy="356" r="7"/>
    <circle cx="128" cy="168" r="7"/>
    <circle cx="356" cy="78" r="7"/>
    <circle cx="416" cy="150" r="7"/>
    <circle cx="320" cy="424" r="7"/>
    <rect x="92" y="78" width="18" height="18" rx="3"/>
    <rect x="426" y="86" width="22" height="22" rx="4"/>
    <rect x="404" y="314" width="16" height="16" rx="3"/>
  </g>

  <!-- gears -->
  <g transform="translate(132 138)" filter="url(#shadow)" opacity="0.95">
    <circle r="72" fill="url(#metal)"/>
    <circle r="50" fill="#102235"/>
    <circle r="26" fill="url(#metal)"/>
    <g fill="url(#metal)">
      <rect x="-9" y="-103" width="18" height="34" rx="2"/>
      <rect x="-9" y="69" width="18" height="34" rx="2"/>
      <rect x="69" y="-9" width="34" height="18" rx="2"/>
      <rect x="-103" y="-9" width="34" height="18" rx="2"/>
      <rect x="-9" y="-103" width="18" height="34" rx="2" transform="rotate(45)"/>
      <rect x="-9" y="69" width="18" height="34" rx="2" transform="rotate(45)"/>
      <rect x="69" y="-9" width="34" height="18" rx="2" transform="rotate(45)"/>
      <rect x="-103" y="-9" width="34" height="18" rx="2" transform="rotate(45)"/>
    </g>
  </g>
  <g transform="translate(376 256) scale(.72)" filter="url(#shadow)" opacity="0.96">
    <circle r="70" fill="url(#metal)"/>
    <circle r="48" fill="#102235"/>
    <circle r="22" fill="url(#metal)"/>
    <circle r="10" fill="#06111d"/>
    <g fill="url(#metal)">
      <rect x="-8" y="-100" width="16" height="32" rx="2"/>
      <rect x="-8" y="68" width="16" height="32" rx="2"/>
      <rect x="68" y="-8" width="32" height="16" rx="2"/>
      <rect x="-100" y="-8" width="32" height="16" rx="2"/>
      <rect x="-8" y="-100" width="16" height="32" rx="2" transform="rotate(45)"/>
      <rect x="-8" y="68" width="16" height="32" rx="2" transform="rotate(45)"/>
      <rect x="68" y="-8" width="32" height="16" rx="2" transform="rotate(45)"/>
      <rect x="-100" y="-8" width="32" height="16" rx="2" transform="rotate(45)"/>
    </g>
  </g>

  <!-- mizuhiki knot -->
  <g filter="url(#shadow)" stroke-linecap="round" stroke-linejoin="round">
    <path d="M116 246 C154 166, 242 170, 256 246 C270 326, 358 330, 396 250" fill="none" stroke="url(#white)" stroke-width="36"/>
    <path d="M116 286 C154 206, 242 210, 256 286 C270 366, 358 370, 396 290" fill="none" stroke="url(#red)" stroke-width="36"/>
    <path d="M116 250 C154 330, 242 326, 256 250 C270 170, 358 166, 396 246" fill="none" stroke="url(#red)" stroke-width="36"/>
    <path d="M116 290 C154 370, 242 366, 256 290 C270 210, 358 206, 396 286" fill="none" stroke="url(#white)" stroke-width="36"/>
    <path d="M204 190 C250 220, 262 318, 308 344" fill="none" stroke="url(#red)" stroke-width="34"/>
    <path d="M308 190 C262 220, 250 318, 204 344" fill="none" stroke="url(#white)" stroke-width="34"/>
    <circle cx="256" cy="267" r="38" fill="#0b1e30" opacity="0.18"/>
  </g>

  <!-- label -->
  <g filter="url(#shadow)">
    <text x="256" y="397" text-anchor="middle" font-family="DejaVu Sans, Arial, sans-serif" font-size="54" font-weight="800" fill="#ffffff">Musubi</text>
    <text x="256" y="438" text-anchor="middle" font-family="DejaVu Sans, Arial, sans-serif" font-size="36" font-weight="800" fill="#8cecff">LoRA Factory</text>
  </g>
</svg>
