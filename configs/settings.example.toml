[ui]
language = "日本語"
target_model = "z-image"

[musubi]
repo_path = "../musubi-tuner"
python_path = "../musubi-tuner/.venv/bin/python"

[paths]
datasets_dir = "datasets/lora"
outputs_dir = "outputs/lora"
comfyui_loras_dir = "../ComfyUI/models/loras"

[caption]
mode = "joycaption_llm"
