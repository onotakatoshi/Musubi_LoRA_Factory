name: Check

on:
  push:
  pull_request:

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libgl1 libxkbcommon-x11-0 libxcb-cursor0

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Prepare settings
        run: cp configs/settings.example.toml configs/settings.toml

      - name: Compile desktop app and support modules
        run: python -m py_compile app/*.py

      - name: Run startup structure check
        run: python app/startup_check.py

      - name: Run desktop static check
        run: python app/desktop_static_check.py

      - name: Run smoke test
        run: python app/smoke_test.py
